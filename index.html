<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHY Events - iOS 26 Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top right, #e0f2fe, #f8fafc);
            min-height: 100vh;
            color: #1d1d1f;
        }
        .ios-blur {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .ios-card {
            border-radius: 35px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ios-card:active {
            transform: scale(0.95);
        }
        .btn-next {
            background: #007aff;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-16">
        <div class="text-2xl font-bold tracking-tight">Events</div>
        <a href="index2.html" class="btn-next px-6 py-2.5 rounded-full font-medium transition-all hover:opacity-90">
            Trang tiếp theo →
        </a>
    </nav>

    <main class="max-w-6xl mx-auto">
        <header class="mb-12">
            <h1 class="text-5xl font-semibold mb-2">Xin chào,</h1>
            <p class="text-xl text-gray-500">Đây là các sự kiện nổi bật của SHY.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="ios-card ios-blur p-8 shadow-sm">
                <div class="w-16 h-16 bg-blue-100 rounded-2xl mb-6 flex items-center justify-center">
                    <span class="text-2xl text-blue-600">✦</span>
                </div>
                <h3 class="text-2xl font-semibold mb-2">Ra mắt SHY</h3>
                <p class="text-gray-500 mb-6">Tổ chức chính thức vào tháng 2.</p>
                <button class="w-full py-3 bg-gray-100 rounded-2xl font-semibold hover:bg-gray-200 transition-colors">Khám phá</button>
            </div>

            <div class="ios-card ios-blur p-8 shadow-sm">
                <div class="w-16 h-16 bg-purple-100 rounded-2xl mb-6 flex items-center justify-center">
                    <span class="text-2xl text-purple-600">☀</span>
                </div>
                <h3 class="text-2xl font-semibold mb-2">Mid-Autumn</h3>
                <p class="text-gray-500 mb-6">Lễ hội trung thu đặc sắc.</p>
                <button class="w-full py-3 bg-gray-100 rounded-2xl font-semibold hover:bg-gray-200 transition-colors">Xem chi tiết</button>
            </div>
        </div>

        <div class="mt-20 text-center">
            <a href="index2.html" class="text-blue-600 font-semibold text-lg hover:underline">Xem thêm sự kiện ở trang sau →</a>
        </div>
    </main>

</body>
</html>
