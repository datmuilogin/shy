<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHY Events - Page 2 (iOS 26)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'SF Pro Display', sans-serif;
            background: radial-gradient(circle at top left, #fff7ed, #ffffff);
            min-height: 100vh;
            color: #1d1d1f;
        }
        .ios-blur {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 163, 115, 0.2);
        }
        .ios-card {
            border-radius: 40px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ios-card:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        }
        .btn-back {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <nav class="max-w-6xl mx-auto flex justify-start items-center mb-16">
        <a href="index.html" class="btn-back px-6 py-2.5 rounded-full font-medium transition-all hover:bg-black/10 flex items-center gap-2">
            ← Quay lại
        </a>
    </nav>

    <main class="max-w-6xl mx-auto">
        <header class="mb-12 text-center md:text-left">
            <h1 class="text-6xl font-bold tracking-tighter mb-4 text-orange-900/80">Workshop 2026</h1>
            <p class="text-xl text-stone-500">Không gian sáng tạo của riêng bạn.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="ios-card ios-blur p-10 overflow-hidden relative group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-orange-200/30 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                <h3 class="text-3xl font-semibold mb-4">Sáng tạo nội dung</h3>
                <p class="text-stone-600 text-lg mb-8 italic">"Nơi những ý tưởng bắt đầu thành hình."</p>
                <div class="flex gap-4">
                    <span class="px-4 py-1 bg-white rounded-full text-xs font-bold border border-orange-100 uppercase">Mới</span>
                    <span class="px-4 py-1 bg-white rounded-full text-xs font-bold border border-orange-100 uppercase">iOS 26</span>
                </div>
            </div>

            <div class="ios-card bg-stone-900 p-10 text-white">
                <h3 class="text-3xl font-semibold mb-4">Phiên bản giới hạn</h3>
                <p class="text-stone-400 text-lg mb-8">Dành cho các thành viên VIP của SHY.</p>
                <button class="px-8 py-3 bg-white text-black rounded-full font-bold">Đăng ký ngay</button>
            </div>
        </div>
    </main>

</body>
</html>
